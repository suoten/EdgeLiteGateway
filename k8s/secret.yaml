apiVersion: v1
kind: Secret
metadata:
  name: edgelite-secrets
  namespace: edgelite
  labels:
    app.kubernetes.io/name: edgelite
type: Opaque
stringData:
  # IMPORTANT: Replace these placeholder values before applying to production.
  # Use `kubectl create secret` or a secrets manager (Sealed Secrets / External Secrets) for real deployments.
  EDGELITE_SECURITY__SECRET_KEY: "CHANGE_ME_to_a_32byte_random_secret_key!"
  EDGELITE_INFLUXDB__TOKEN: "CHANGE_ME_influxdb_token"
  EDGELITE_MQTT__PASSWORD: "CHANGE_ME_mqtt_password"
  EDGELITE_ADMIN_PASSWORD: "CHANGE_ME_admin_password"
  EDGELITE_RESET_ADMIN_PASSWORD: "false"
  INFLUXDB_USERNAME: "edgelite"
  INFLUXDB_PASSWORD: "CHANGE_ME_influxdb_password"
  INFLUXDB_TOKEN: "CHANGE_ME_influxdb_token"
