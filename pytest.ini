# pytest 配置 — 补充 pyproject.toml 中的 [tool.pytest.ini_options]
# 此文件存在使扫描器和 IDE 能自动检测到 pytest 测试框架
[pytest]
asyncio_mode = auto
testpaths = tests
addopts = --tb=short -q
markers =
    integration: integration tests requiring external services
    stress: stress and performance tests
    stability: long-running stability tests
    chaos: chaos engineering tests
    e2e: end-to-end frontend tests
    smoke: smoke tests for post-deployment validation
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
