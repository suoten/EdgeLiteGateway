# EdgeLite Gateway - pytest configuration
# This file supplements pyproject.toml [tool.pytest.ini_options] for DevOps scanner compatibility.
# Some CI/CD scanners and IDE plugins look for pytest.ini as a marker that the project uses pytest.
# The authoritative configuration lives in pyproject.toml; this file mirrors critical settings.

[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio support
asyncio_mode = auto

# Output format
addopts = --tb=short -q

# Markers
markers =
    integration: integration tests requiring external services
    stress: stress and performance tests
    stability: long-running stability tests
    chaos: chaos engineering tests
    e2e: end-to-end frontend tests
    smoke: smoke tests for deployment verification

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
