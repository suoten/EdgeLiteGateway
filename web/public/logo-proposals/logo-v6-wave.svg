<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="w6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="w6b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="w6c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <filter id="w6g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="url(#w6a)" stroke-width="0.5" opacity="0.2"/>

  <!-- 外环流动波 -->
  <path d="M 20 64 Q 42 30, 64 64 Q 86 98, 108 64" fill="none" stroke="url(#w6a)" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#w6g)"/>
  <path d="M 20 64 Q 42 98, 64 64 Q 86 30, 108 64" fill="none" stroke="url(#w6c)" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#w6g)"/>

  <!-- 中环 -->
  <path d="M 30 64 Q 47 42, 64 64 Q 81 86, 98 64" fill="none" stroke="url(#w6b)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 30 64 Q 47 86, 64 64 Q 81 42, 98 64" fill="none" stroke="url(#w6a)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- 内环 -->
  <path d="M 40 64 Q 52 50, 64 64 Q 76 78, 88 64" fill="none" stroke="url(#w6c)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 40 64 Q 52 78, 64 64 Q 76 50, 88 64" fill="none" stroke="url(#w6b)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- 核心圆 -->
  <circle cx="64" cy="64" r="10" fill="url(#w6a)" opacity="0.95" filter="url(#w6g)"/>
  <circle cx="64" cy="64" r="5" fill="white" opacity="0.9"/>

  <!-- 节点 -->
  <circle cx="20" cy="64" r="3.5" fill="url(#w6a)"/>
  <circle cx="108" cy="64" r="3.5" fill="url(#w6c)"/>
  <circle cx="64" cy="64" r="3.5" fill="url(#w6b)"/>
</svg>