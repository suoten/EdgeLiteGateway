<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="v3g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="v3g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="v3g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="v3blur">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景装饰圆 -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="url(#v3g3)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="url(#v3g3)" stroke-width="0.5" opacity="0.1" stroke-dasharray="3 6"/>
  
  <!-- 左上弧线 -->
  <path d="M 20 64 A 44 44 0 0 1 64 20" fill="none" stroke="url(#v3g2)" stroke-width="4" stroke-linecap="round" filter="url(#v3blur)"/>
  
  <!-- 右上弧线 -->
  <path d="M 64 20 A 44 44 0 0 1 108 64" fill="none" stroke="url(#v3g1)" stroke-width="4" stroke-linecap="round" filter="url(#v3blur)"/>
  
  <!-- 右下弧线 -->
  <path d="M 108 64 A 44 44 0 0 1 64 108" fill="none" stroke="url(#v3g1)" stroke-width="4" stroke-linecap="round" opacity="0.7" filter="url(#v3blur)"/>
  
  <!-- 左下弧线 -->
  <path d="M 64 108 A 44 44 0 0 1 20 64" fill="none" stroke="url(#v3g2)" stroke-width="4" stroke-linecap="round" opacity="0.7" filter="url(#v3blur)"/>
  
  <!-- 中心核心圆环 -->
  <circle cx="64" cy="64" r="22" fill="none" stroke="url(#v3g3)" stroke-width="3" opacity="0.9"/>
  <circle cx="64" cy="64" r="16" fill="url(#v3g3)" opacity="0.15"/>
  
  <!-- 中心E -->
  <text x="64" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#v3g3)">E</text>
  
  <!-- 四个节点 -->
  <circle cx="20" cy="64" r="5" fill="url(#v3g2)"/>
  <circle cx="20" cy="64" r="2.5" fill="white"/>
  
  <circle cx="108" cy="64" r="5" fill="url(#v3g1)"/>
  <circle cx="108" cy="64" r="2.5" fill="white"/>
  
  <circle cx="64" cy="20" r="5" fill="url(#v3g1)"/>
  <circle cx="64" cy="20" r="2.5" fill="white"/>
  
  <circle cx="64" cy="108" r="5" fill="url(#v3g2)"/>
  <circle cx="64" cy="108" r="2.5" fill="white"/>
  
  <!-- 连接线到中心 -->
  <line x1="25" y1="64" x2="42" y2="64" stroke="url(#v3g2)" stroke-width="1.5" opacity="0.5"/>
  <line x1="103" y1="64" x2="86" y2="64" stroke="url(#v3g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="64" y1="25" x2="64" y2="42" stroke="url(#v3g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="64" y1="103" x2="64" y2="86" stroke="url(#v3g2)" stroke-width="1.5" opacity="0.5"/>
</svg>