# EdgeLite Gateway Mypy Configuration
# This file provides standalone mypy config for tools that don't read pyproject.toml.
# The authoritative configuration lives in pyproject.toml [tool.mypy]; this mirrors it.

[mypy]
python_version = 3.11
namespace_packages = True
ignore_missing_imports = True
follow_imports = silent
check_untyped_defs = False
disallow_untyped_defs = False
warn_unused_ignores = False
warn_redundant_casts = False
warn_return_any = False
no_implicit_optional = True
show_error_codes = True

# SQLAlchemy ORM type inference is a known limitation
[mypy-sqlalchemy.*]
ignore_errors = True

[mypy-edgelite.models.*]
ignore_errors = True

# Third-party protocol libraries with dynamic attributes
[mypy-pymodbus.*]
ignore_errors = True

[mypy-aiomqtt.*]
ignore_errors = True

[mypy-onnxruntime.*]
ignore_errors = True
