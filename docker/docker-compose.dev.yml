services:
  edgelite:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: edgelite-gateway-dev
    ports:
      - "8080:8080"
    volumes:
      - ../src/edgelite:/app/edgelite
      - ../configs:/app/configs
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - EDGELITE_INFLUXDB__URL=http://influxdb:8086
      - EDGELITE_INFLUXDB__TOKEN=${INFLUXDB_TOKEN:-edgelite-token-change-me}
      - EDGELITE_MQTT__BROKER=mosquitto
      - EDGELITE_SECURITY__SECRET_KEY=${SECRET_KEY:-dev-secret-key-not-for-production}
    command: python -m edgelite --host 0.0.0.0 --port 8080 --reload --reload-dir /app/edgelite
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edgelite-net

  influxdb:
    image: influxdb:2.7-alpine
    container_name: edgelite-influxdb-dev
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-admin123}
      - DOCKER_INFLUXDB_INIT_ORG=edgelite
      - DOCKER_INFLUXDB_INIT_BUCKET=edgelite
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-edgelite-token-change-me}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edgelite-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edgelite-mosquitto-dev
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edgelite-net

volumes:
  influxdb-data:
  mosquitto-data:

networks:
  edgelite-net:
    driver: bridge
