services:
  edgelite:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: edgelite-gateway
    ports:
      - "127.0.0.1:8080:8080"  # FIXED-P1: 端口绑定到localhost，通过nginx反代访问
    volumes:
      - ../data:/app/data
      - ../configs:/app/configs:ro  # 7#修复: 改为只读挂载，与 read_only: true 的安全加固意图一致，防止容器内篡改配置
      - ../logs:/app/logs
    # R5-C003/C004 修复(严重): 容器安全加固 - 日志限制 + 只读文件系统 + 最小权限
    # C-003: 添加日志驱动限制，防止日志无限增长撑满磁盘
    # C-004: read_only 防止攻击者写入恶意文件；cap_drop 移除所有 Linux capabilities；
    #        tmpfs 挂载 /tmp 和 /run 供运行时临时写入
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - EDGELITE_INFLUXDB__URL=http://influxdb:8086
      - EDGELITE_INFLUXDB__TOKEN=${INFLUXDB_TOKEN:?INFLUXDB_TOKEN must be set in docker/.env}
      - EDGELITE_MQTT__BROKER=mosquitto
      # P1-1修复: edgelite 服务需配置 MQTT 用户名/密码以匹配 mosquitto.conf 中 allow_anonymous false 的鉴权要求
      - EDGELITE_MQTT__USERNAME=edgelite
      - EDGELITE_MQTT__PASSWORD=${MQTT_PASSWORD:?MQTT_PASSWORD must be set in docker/.env}
      - EDGELITE_SECURITY__SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in docker/.env}
      - EDGELITE_SERVER__HOST=0.0.0.0
      - EDGELITE_SERVER__PORT=8080
      # 10#修复: 使用推荐字段名 cors_allowed_origins（旧字段 cors_origins 仅作向后兼容读取）
      - EDGELITE_SERVER__CORS_ALLOWED_ORIGINS=http://localhost:8080;http://localhost:3000
      - EDGELITE_ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in docker/.env}
      - EDGELITE_RESET_ADMIN_PASSWORD=${ADMIN_RESET_PASSWORD:-false}
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      # FIXED: 使用 /health/live 轻量端点替代 /health 完整检查 [2026-06-29]
      # /health 执行 DB+InfluxDB+MQTT+Drivers 串行检查（5s 总超时），依赖抖动即触发重启循环
      # /health/live 仅返回 {"status":"ok"}，适合 liveness 探针
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8080/health/live'); exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s  # R7-S-16: 与 Dockerfile HEALTHCHECK start_period 一致，避免容器在启动慢时无限重启
    restart: unless-stopped
    deploy:  # FIXED-P1: 添加资源限制，防止容器无限消耗宿主机资源
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - edgelite-net

  frontend:
    image: nginx:alpine
    container_name: edgelite-frontend
    profiles:
      - nginx
    ports:
      - "127.0.0.1:3000:80"  # FIXED-P2: 端口绑定到localhost，通过nginx反代访问
    volumes:
      - ../web/dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      edgelite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:  # FIXED-P1: 添加资源限制
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    networks:
      - edgelite-net

  influxdb:
    image: influxdb:2.7-alpine
    container_name: edgelite-influxdb
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-edgelite}  # FIXED-P2: 用户名从环境变量读取，默认edgelite而非admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:?INFLUXDB_PASSWORD must be set in docker/.env}
      - DOCKER_INFLUXDB_INIT_ORG=edgelite
      - DOCKER_INFLUXDB_INIT_BUCKET=edgelite
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:?INFLUXDB_TOKEN must be set in docker/.env}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      # FIXED: 首次 setup 初始化需时间，无 start_period 会被误判 unhealthy 触发重启循环打断初始化 [2026-06-29]
      start_period: 30s
    restart: unless-stopped
    deploy:  # FIXED-P1: 添加资源限制
      resources:
        limits:
          memory: 256m
          cpus: "1.0"
    networks:
      - edgelite-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edgelite-mosquitto
    ports:
      - "127.0.0.1:1883:1883"  # FIXED-P2: MQTT端口绑定到localhost，与InfluxDB一致
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-config:/mosquitto/config  # FIXED-P0: 可写config卷用于存放passwd文件
    # P1-1修复: entrypoint 引用 MQTT_PASSWORD 生成 passwd，必须在 environment 中显式声明
    # 使用 :? 语法保证未设置时 compose 启动即失败，避免容器空跑
    environment:
      - MQTT_PASSWORD=${MQTT_PASSWORD:?MQTT_PASSWORD must be set in docker/.env}
    entrypoint: ["/bin/sh", "-c", "if [ ! -f /mosquitto/config/passwd ]; then touch /mosquitto/config/passwd && echo \"$${MQTT_PASSWORD:?MQTT_PASSWORD must be set in docker/.env}\" | mosquitto_passwd /mosquitto/config/passwd edgelite; fi && exec /docker-entrypoint.sh mosquitto -c /mosquitto/config/mosquitto.conf"]  # R7-S-14: 改用 stdin 模式传入密码，避免密码出现在 /proc/*/cmdline 中
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
      # FIXED: entrypoint 生成 passwd 后才启动 broker，无 start_period 可能在 passwd 生成期间被误判 unhealthy [2026-06-29]
      start_period: 15s
    restart: unless-stopped
    deploy:  # FIXED-P1: 添加资源限制
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    networks:
      - edgelite-net

  # ── Monitoring: Prometheus metrics scraper ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: edgelite-prometheus
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - edgelite-net

  # ── Monitoring: Grafana visualization dashboard ─────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: edgelite-grafana
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in docker/.env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    networks:
      - edgelite-net

volumes:
  influxdb-data:
  mosquitto-data:
  mosquitto-config:  # FIXED-P0: mosquitto配置卷用于存放passwd文件
  prometheus-data:
  grafana-data:

networks:
  edgelite-net:
    driver: bridge
