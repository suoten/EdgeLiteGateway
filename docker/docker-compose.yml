# EdgeLiteGateway Docker Compose (Production)
# 包含：后端 + 前端(Nginx) + InfluxDB + Mosquitto
version: "3.8"

services:
  edgelite:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: edgelite-gateway
    expose:
      - "8080"
    volumes:
      - ../data:/app/data
      - ../configs:/app/configs
      - ../logs:/app/logs
    environment:
      - EDGELITE_INFLUXDB__URL=http://influxdb:8086
      - EDGELITE_INFLUXDB__TOKEN=${INFLUXDB_TOKEN:-}
      - EDGELITE_MQTT__BROKER=mosquitto
      - EDGELITE_SECURITY__SECRET_KEY=${SECRET_KEY:-}
      - EDGELITE_SERVER__HOST=0.0.0.0
      - EDGELITE_SERVER__PORT=8080
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    networks:
      - edgelite-net

  frontend:
    image: nginx:alpine
    container_name: edgelite-frontend
    ports:
      - "3000:80"
    volumes:
      - ../web/dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - edgelite
    restart: unless-stopped
    networks:
      - edgelite-net

  influxdb:
    image: influxdb:2.7-alpine
    container_name: edgelite-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-edgelite2024}
      - DOCKER_INFLUXDB_INIT_ORG=edgelite
      - DOCKER_INFLUXDB_INIT_BUCKET=edgelite
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edgelite-net

  mosquitto:
    image: eclipse-mosquitto:2-openssl
    container_name: edgelite-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped
    networks:
      - edgelite-net

volumes:
  influxdb-data:
  mosquitto-data:
  mosquitto-log:

networks:
  edgelite-net:
    driver: bridge
