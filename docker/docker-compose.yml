services:
  edgelite:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: edgelite-gateway
    ports:
      - "8080:8080"
    volumes:
      - ../data:/app/data
      - ../configs:/app/configs
      - ../logs:/app/logs
    environment:
      - EDGELITE_INFLUXDB__URL=http://influxdb:8086
      - EDGELITE_INFLUXDB__TOKEN=${INFLUXDB_TOKEN:-K7mX2pR9vW4yH1jM6cF0gL3pS8tV2wZ5bD9mJ4qR7uX0yA3cE6hK9lN2pR5tV8wB1dG4jM7qS0u}
      - EDGELITE_MQTT__BROKER=mosquitto
      - EDGELITE_SECURITY__SECRET_KEY=${SECRET_KEY:-c8nSH3RdgLhrlVIMi0SQOo-9C64wFnDlpE9AxZaf8oI}
      - EDGELITE_SERVER__HOST=0.0.0.0
      - EDGELITE_SERVER__PORT=8080
      - EDGELITE_SERVER__CORS_ORIGINS=http://localhost:8080;http://localhost:3000
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - edgelite-net

  frontend:
    image: nginx:alpine
    container_name: edgelite-frontend
    profiles:
      - nginx
    ports:
      - "3000:80"
    volumes:
      - ../web/dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      edgelite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - edgelite-net

  influxdb:
    image: influxdb:2.7-alpine
    container_name: edgelite-influxdb
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-edgelite-admin-2024}
      - DOCKER_INFLUXDB_INIT_ORG=edgelite
      - DOCKER_INFLUXDB_INIT_BUCKET=edgelite
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-K7mX2pR9vW4yH1jM6cF0gL3pS8tV2wZ5bD9mJ4qR7uX0yA3cE6hK9lN2pR5tV8wB1dG4jM7qS0u}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edgelite-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edgelite-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edgelite-net

volumes:
  influxdb-data:
  mosquitto-data:

networks:
  edgelite-net:
    driver: bridge
