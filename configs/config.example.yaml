# EdgeLiteGateway 配置示例
# 复制此文件为 config.yaml 并修改配置
# 敏感字段请替换为实际值，切勿提交真实密钥到版本库
#
# 配置优先级：环境变量 > .env 文件 > config.yaml
# 推荐使用 .env 文件管理敏感配置，参见 .env.example
# 环境变量格式：EDGELITE_<SECTION>__<KEY>（双下划线分隔）
# 示例：EDGELITE_INFLUXDB__TOKEN=<your-token>
#       EDGELITE_SECURITY__SECRET_KEY=<your-secret>

# ── 服务配置 ──────────────────────────────────────────────
server:
  host: "127.0.0.1"       # FIXED-P1: 默认仅监听localhost，Docker部署通过环境变量覆盖为0.0.0.0
  port: 8080                # 监听端口，默认 8080
  # FIXED: 使用推荐字段 cors_allowed_origins（旧字段 cors_origins 仅向后兼容读取）[2026-06-29]
  cors_allowed_origins:      # CORS 允许源列表，生产环境限制为实际域名
    - "http://localhost:3000"  # Vite 开发服务器默认端口
    # - "https://edgelite.example.com"  # 生产环境前端域名
  webhook_api_key: ""        # Webhook 回调 API Key（空则不校验）
  debug_api_enabled: false   # Debug API 开关（/debug/simulate、/debug/read、/debug/write），生产环境强制关闭
  debug_api_allowed_ips:     # Debug API 允许访问的 IP 列表（空列表=拒绝所有）
    - "127.0.0.1"
    - "::1"
  trusted_proxies: []        # 可信代理 IP 列表（支持 CIDR），用于 X-Forwarded-For 解析，空列表=不信任任何代理
  allowed_hosts: []          # TrustedHostMiddleware 允许的 Host 头列表，生产环境配置后启用 Host 头校验

# ── 数据库配置 ────────────────────────────────────────────
database:
  backend: "sqlite"               # 数据库后端: sqlite | mysql | postgresql | mssql
  sqlite_path: "data/edgelite.db" # SQLite数据库文件路径（backend=sqlite时使用）
  host: "localhost"               # 数据库主机（backend非sqlite时必填）
  port: 3306                      # 数据库端口（MySQL:3306, PostgreSQL:5432, MSSQL:1433）
  username: ""                    # 数据库用户名
  password: "${EDGELITE_DB_PASSWORD}"  # 数据库密码（建议通过环境变量配置）
  database: "edgelite"            # 数据库名
  backup_dir: "data/backups"      # 备份目录
  pool_size: 5                    # 连接池大小
  max_overflow: 10                # 连接池最大溢出
  echo: false                     # SQL日志（调试用）
  optimistic_lock_retries: 3      # 乐观锁重试次数（范围1-20）
  trust_server_certificate: false # MSSQL TrustServerCertificate（默认False，不跳过证书验证）
  slow_query_threshold_s: 1.0     # 慢查询阈值（秒），超过此值的SQL将被记录

# ── InfluxDB 时序数据库 ──────────────────────────────────
influxdb:
  url: "http://localhost:8086"     # InfluxDB 服务地址
  token: "${INFLUXDB_TOKEN}"       # FIXED-P1: 引导使用环境变量，避免占位符被误用
  org: "edgelite"                  # 组织名（需与 InfluxDB 初始化时一致）
  bucket: "edgelite"               # Bucket 名（需与 InfluxDB 初始化时一致）
  batch_size: 1000                 # 批量写入数据点数，增大可提高吞吐量（范围：100-10000）
  flush_interval: 5000             # 批量刷新间隔（毫秒），增大可减少写入频率（范围：1000-30000）
  retention_days: 30               # 数据保留天数，超期自动删除（范围：1-3650，默认30）
  fallback_backend: "sqlite"       # InfluxDB 不可用时的降级后端：sqlite | none
  sqlite_ts_path: "data/edgelite_ts.db"  # 降级SQLite时序库路径
  auto_sync_on_recovery: true      # InfluxDB恢复后自动同步缓存数据
  sync_batch_size: 500             # 恢复同步批量大小（范围：10-5000）
  sync_interval: 30                # 恢复同步间隔（秒，范围：5-300）
  network_probe_url: "https://www.baidu.com"  # 网络探测URL，用于判断InfluxDB可达性
  downsample:                      # 数据降采样配置
    enabled: true                  # 是否启用降采样
    tier1_age_days: 7              # 1min→5min 降采样阈值（天）
    tier2_age_days: 30             # 5min→1hour 降采样阈值（天）
    tier3_age_days: 90             # 1hour→1day 降采样阈值（天）
    auto_run: false                # 是否自动执行降采样
    run_interval_hours: 24         # 自动降采样执行间隔（小时，范围：1-168）

# ── MQTT 北向转发 ────────────────────────────────────────
mqtt:
  broker: "localhost"              # MQTT Broker 地址
  port: 1883                       # Broker 端口（TCP）
  username: ""                     # 认证用户名（空则不认证）
  password: "${EDGELITE_MQTT_PASSWORD}"  # 认证密码（通过环境变量配置，空值表示不认证）
  topic_prefix: "edgelite"         # 发布主题前缀，完整主题：{prefix}/{device_id}/{point_name}
  offline_cache_enabled: true      # 是否启用断网缓存（断网时消息持久化到SQLite）
  offline_db_path: "data/mqtt_offline_queue.db"  # 离线缓存数据库路径
  max_queue_size: 10000            # 离线队列最大条数，超出后丢弃最早数据
  max_retries: 100                 # 单条消息最大重试次数
  retry_interval: 5.0              # 重传间隔（秒）
  ring_buffer_capacity: 50000      # 环形缓冲容量（条，范围：≥1000）
  ring_buffer_compress: true       # 是否压缩环形缓冲

# ── 内置 MQTT Server（南向仿真）──────────────────────────
mqtt_server:
  enabled: false                   # 是否启用内置 MQTT Server
  host: "127.0.0.1"                # FIXED-P1: 默认仅监听localhost
  port: 1888                       # TCP 监听端口（避免与系统 MQTT Broker 冲突）
  ws_port: null                    # WebSocket 端口，null 表示不启用 WebSocket
  username: ""                     # 客户端认证用户名（空则不认证）
  password: "${EDGELITE_MQTT_SERVER_PASSWORD}"  # 客户端认证密码（通过环境变量配置，空值表示不认证）
  allow_no_auth: false             # 无认证时是否允许启动（默认false，需显式设为true才允许）

# ── 内置 Modbus Slave（南向仿真）─────────────────────────
modbus_slave:
  enabled: false                   # 是否启用内置 Modbus Slave
  host: "127.0.0.1"                # FIXED-P1: 默认仅监听localhost
  port: 5020                       # 监听端口（默认5020，避免与系统Modbus冲突）
  holding_size: 1000               # 保持寄存器数量（地址 0-999）
  input_size: 1000                 # 输入寄存器数量（地址 0-999）
  coil_size: 1000                  # 线圈数量（地址 0-999）
  discrete_size: 1000              # 离散输入数量（地址 0-999）

# ── 视频接入（PyGBSentry）────────────────────────────────
video:
  pygbsentry:
    endpoint: ""                   # PyGBSentry 服务地址，如 http://192.168.1.100:8080
    api_key: "${PYGBSENTRY_API_KEY}"  # FIXED-P1: 引导使用环境变量
    timeout: 10                    # 请求超时（秒）

# ── 安全配置 ─────────────────────────────────────────────
security:
  secret_key: "${EDGELITE_SECRET_KEY}"  # FIXED-P1: 引导使用环境变量，避免占位符被误用
  access_token_expire_minutes: 30  # access_token 过期时间（分钟）
  refresh_token_expire_days: 7     # refresh_token 过期时间（天）
  algorithm: "HS256"               # JWT 签名算法，可选：HS256 / HS384 / HS512
  max_token_ttl_days: 30           # Token TTL 上限（天），防止过长过期时间
  rate_limit_requests_per_minute: 120  # API 速率限制（每分钟请求数）
  rate_limit_login_per_minute: 5   # 登录速率限制（每分钟尝试数）
  login_lockout_threshold: 5       # 单IP登录失败锁定阈值
  login_lockout_minutes: 15        # 单IP登录锁定时长（分钟）
  global_lockout_threshold: 10     # 用户名全局锁定阈值（15分钟窗口内）
  global_lockout_duration: 30      # 用户名全局锁定时长（分钟）
  global_failure_rate_threshold: 50  # 全局失败率阈值（每分钟）
  global_lockout_window: 15        # 全局锁定窗口（分钟）
  protected_roles:                 # 受保护角色列表（这些角色的敏感字段不可通过API修改）
    - "admin"
  # csrf_secret: ""                # CSRF签名密钥（空值回退到secret_key，建议通过EDGELITE_SECURITY__CSRF_SECRET独立配置）
  # cookie_secure: false           # Cookie Secure标记（生产环境自动设为true）

# ── 日志配置 ─────────────────────────────────────────────
logging:
  level: "INFO"                    # 日志级别：DEBUG / INFO / WARNING / ERROR / CRITICAL（生产环境建议 WARNING）
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"  # 日志格式
  json_format: false               # 是否使用JSON结构化日志（生产环境建议true）
  log_dir: "data/logs"             # 日志文件目录
  max_bytes: 52428800              # 单个日志文件最大字节数（50MB）
  backup_count: 10                 # 日志文件保留份数

# ── 模拟器配置 ───────────────────────────────────────────
simulator:
  auto_create: false               # FIXED-P1: 默认关闭，开发环境设为true
  default_devices:                 # 默认模拟设备列表
    - device_id: "sim-temperature-01"  # 设备唯一标识
      name: "温度传感器模拟"            # 设备名称
      points:                          # 测点定义
        - name: "temperature"          # 测点名称
          data_type: "float32"         # 数据类型：bool / int16 / uint16 / float32
          unit: "°C"                   # 单位
          address: "0"                 # 地址（模拟器中仅作标识）
          access_mode: "r"            # 访问模式：r(只读) / w(可写) / rw(读写)
          min: 15.0                    # 最小值（用于 sine/random_walk/random 模式）
          max: 35.0                    # 最大值
          mode: "sine"                 # 模拟模式：fixed(固定值) / sine(正弦波) / random_walk(随机游走) / random(均匀随机)
        - name: "humidity"
          data_type: "float32"
          unit: "%"
          address: "1"
          access_mode: "r"
          min: 30.0
          max: 90.0
          mode: "random_walk"
      collect_interval: 5             # 采集间隔（秒）

# ── 告警通知渠道 ─────────────────────────────────────────
notify:
  dingtalk:
    enabled: true                   # 是否启用钉钉通知
    name: "钉钉通知"                 # 通知渠道名称
    webhook_url: ""                 # 钉钉机器人 Webhook URL（https://oapi.dingtalk.com/robot/send?access_token=xxx）
    secret: "${EDGELITE_DINGTALK_SECRET}"  # FIXED-P1: 加签密钥改为环境变量引用
    at_mobiles: []                  # @指定手机号列表
    is_at_all: false                # 是否@所有人
    max_per_minute: 10              # 每分钟最大发送数
    cooldown_seconds: 60.0          # 冷却时间（秒）
  email:
    smtp_host: ""                   # SMTP 服务器地址
    smtp_port: 465                  # SMTP 端口（465=SSL, 587=STARTTLS）
    smtp_user: ""                   # SMTP 认证用户名
    smtp_password: "${EDGELITE_SMTP_PASSWORD}"  # FIXED-P1: SMTP密码改为环境变量引用
    use_tls: true                   # 是否使用 TLS/SSL
    use_starttls: false             # 是否使用 STARTTLS
    from_addr: ""                   # 发件人地址（空则使用 smtp_user）
    to_addrs: []                    # 收件人地址列表
    max_per_minute: 60              # 每分钟最大发送数
    cooldown_seconds: 60.0          # 冷却时间（秒）
  wechat:
    webhook_url: ""                 # 企业微信机器人 Webhook URL（https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx）
  webhook:
    enabled: true                   # 是否启用自定义Webhook通知
    name: "自定义Webhook"            # 通知渠道名称
    url: ""                         # 自定义 Webhook URL
    method: "POST"                  # HTTP 方法（GET/POST/PUT）
    headers: {}                     # 自定义请求头（如 {"Authorization": "Bearer xxx"}）
    auth_type: "none"               # 认证类型：none / basic / bearer / api_key
    auth_token: ""                  # Bearer/API Key Token
    auth_username: ""               # Basic 认证用户名
    auth_password: ""               # Basic 认证密码
    max_per_minute: 10              # 每分钟最大发送数
    cooldown_seconds: 60.0          # 冷却时间（秒）

# ── 北向平台对接 ─────────────────────────────────────────
platforms: {}
# platforms:
#   iotsharp:                        # IoTSharp 平台
#     enabled: true
#     endpoint: "http://your-iotsharp:8080"  # IoTSharp 服务地址
#     api_key: "<your-iotsharp-api-key>"       # API Key
#   thingsboard:                     # ThingsBoard 平台
#     enabled: true
#     endpoint: "http://your-thingsboard:8080"  # ThingsBoard 服务地址
#     token: "<your-thingsboard-token>"            # 访问 Token

# ── 串口 TCP 透传 ──────────────────────────────────────
serial_bridge:
  enabled: false                   # 是否启用串口透传
  serial_port: "COM1"              # 串口设备路径（Windows: COM1, Linux: /dev/ttyUSB0）
  baud_rate: 9600                  # 波特率
  tcp_port: 9000                   # TCP 监听端口
  ip_whitelist: []                 # IP 白名单（空则不限）
  max_clients: 5                   # 最大客户端数，范围 1-50

# ── 边缘数据预处理 ─────────────────────────────────────
preprocess:
  enabled: false                   # 是否启用预处理
  default_deadband: 0.0            # 默认死区值，≥ 0.0
  default_filter_window: 3         # 默认滤波窗口大小，范围 1-21（奇数）
  default_aggregate_window_sec: 0  # 默认聚合时间窗口（秒），0 表示不聚合

# ── HTTP Webhook 安全认证 ─────────────────────────────
webhook_auth:
  mode: "none"                     # 认证模式：none / bearer / basic
  token: "${EDGELITE_WEBHOOK_TOKEN}"        # Bearer Token（mode=bearer 时使用）
  username: ""                     # Basic 认证用户名（mode=basic 时使用）
  password: "${EDGELITE_WEBHOOK_PASSWORD}"  # Basic 认证密码（mode=basic 时使用）

# ── MQTT TLS/SSL 配置 ─────────────────────────────────
mqtt_tls:
  enabled: false                   # 是否启用 MQTT TLS
  ca_cert: ""                      # CA 证书文件路径
  client_cert: ""                  # 客户端证书文件路径
  client_key: ""                   # 客户端私钥文件路径
  cert_reqs: "required"            # 证书要求：required / optional / none

# ── 驱动配置 ───────────────────────────────────────────
drivers:
  custom_dir: ""                   # 自定义驱动目录路径
  auto_reload: false               # 是否自动重载驱动变更

# ── 边缘AI推理引擎配置 ───────────────────────────────────
ai_inference:
  enabled: true                    # 是否启用AI推理引擎（默认启用）
  models_dir: ""                   # 模型文件目录（空则自动定位包内ai_models目录）
  hot_reload_timeout: 30           # 模型热加载超时（秒）
  inference_timeout: 10            # 推理超时（秒）
  max_concurrent_inferences: 4     # 最大并发推理数
  stats_retention_days: 7          # 推理统计保留天数
# 注：若模型文件缺失，启动时会自动生成预置onnx模型
# 若onnxruntime未安装，模型将标记为inactive，安装后可通过API启用

# ── MCP Server（Model Context Protocol）─────────────────
# FIXED: 补全 example 缺失的顶级 key，与 config.yaml/AppConfig 对齐 [2026-06-29]
mcp_server:
  enabled: false                   # 是否启用 MCP Server（默认关闭，按需开启）

# ── Grafana 集成 ────────────────────────────────────────
grafana:
  enabled: false                   # 是否启用 Grafana 数据源/仪表盘集成
  url: "http://localhost:3001"     # Grafana 服务地址
  api_key: "${GRAFANA_API_KEY}"    # Grafana API Key（通过环境变量配置）
  datasource: "InfluxDB"           # 默认数据源名称

# ── 自动备份调度 ────────────────────────────────────────
backup:
  enabled: false                   # 是否启用定时备份
  interval_hours: 24               # 备份间隔（小时）
  retain_days: 7                   # 备份保留天数
  backup_dir: "data/backups"       # 备份目录
  min_free_mb: 100                 # 触发备份前最小可用磁盘空间（MB）

# ── 缓存层（环形缓冲/水位线）────────────────────────────
cache:
  ring_buffer_capacity: 100000     # 环形缓冲容量（条）
  ring_buffer_compress: true       # 是否压缩环形缓冲
  incremental_sync_enabled: true   # 是否启用增量同步
  high_watermark_pct: 0.8          # 高水位线（触发同步）
  critical_watermark_pct: 0.9      # 临界水位线（强制同步）

# ── 采集调度配置 ─────────────────────────────────────
scheduler:
  max_concurrent_collects: 50      # 最大并发采集数，超过时排队等待（范围：1-500）
  error_rate_threshold: 0.1        # 帧错误率告警阈值（0.1=10%），超阈值发布告警事件
  watchdog_interval: 30            # 看门狗检查间隔（秒），范围 5-300
  watchdog_stale_cycles: 3         # 设备标记stale的未产出周期数
  watchdog_restart_cycles: 10      # 设备采集Task重启的未产出周期数

# ── OTA 更新地址 ────────────────────────────────────────
ota_update_url: ""                 # 固件/应用 OTA 检查地址，空则禁用 OTA 检查

# ── CSRF 密钥（顶级字段，由环境变量 EDGELITE_CSRF_SECRET 读取）──
# FIXED: 补全 example 缺失文档；生产环境必须配置，否则重启后 CSRF token 失效 [2026-06-29]
# 生成命令: python -c "import secrets; print(secrets.token_urlsafe(32))"
csrf_secret: "${EDGELITE_CSRF_SECRET}"
