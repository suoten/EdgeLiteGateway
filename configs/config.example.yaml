# ── 边缘AI推理引擎配置 ───────────────────────────────────
ai_inference:
  enabled: true                    # 是否启用AI推理引擎（默认启用）
  models_dir: ""                   # 模型文件目录（空则自动定位包内ai_models目录）
  hot_reload_timeout: 30           # 模型热加载超时（秒）
  inference_timeout: 10            # 推理超时（秒）
  max_concurrent_inferences: 4     # 最大并发推理数
  stats_retention_days: 7          # 推理统计保留天数
# 注：若模型文件缺失，启动时会自动生成预置onnx模型
# 若onnxruntime未安装，模型将标记为inactive，安装后可通过API启用

