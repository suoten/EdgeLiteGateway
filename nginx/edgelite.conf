# EdgeLiteGateway Nginx 反向代理配置
# 使用方法：
#   1. 修改 server_name 为你的实际域名
#   2. 修改 ssl_certificate 和 ssl_certificate_key 为你的证书路径
#   3. 修改 root 为前端构建产物路径
#   4. 将此文件复制到 /etc/nginx/conf.d/ 或 /etc/nginx/sites-enabled/
#   5. nginx -t && nginx -s reload

# ============================================
# 限流区定义（必须在 http 块上下文，独立配置文件由 nginx.conf 的 include 加载）
# FIXED-P0: 添加请求频率与并发连接限制，防止 API 暴力请求和登录爆破
# ============================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ============================================
# HTTP -> HTTPS 重定向（可选）
# ============================================
server {
    listen 80;
    server_name edgelite.example.com;
    return 301 https://$server_name$request_uri;
}

# ============================================
# HTTPS 主配置
# ============================================
server {
    listen 443 ssl http2;
    server_name edgelite.example.com;

    # SSL 证书配置（请替换为实际路径）
    ssl_certificate /etc/ssl/certs/edgelite.example.com.pem;
    ssl_certificate_key /etc/ssl/private/edgelite.example.com.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    server_tokens off;  # FIXED-P4: 隐藏Nginx版本号
    client_max_body_size 50m;

    # FIXED-P0: 全局并发连接数限制（防止单 IP 连接耗尽 DoS）
    limit_conn conn_limit 10;

    add_header X-Frame-Options "SAMEORIGIN" always;  # FIXED-P4: 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # FIXED-P4: HSTS
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:" always;  # FIXED-P4: CSP

    # --- 前端静态文件（SPA）---
    location / {
        root /var/www/edgelite;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # FIXED-P0: 登录/重置密码等敏感认证端点单独限流（10r/m，更严格）
    location = /api/v1/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /api/v1/auth/forgot-password {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /api/v1/auth/reset-password {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- 后端 API 代理 ---
    location /api/ {
        # FIXED-P0: API 全局限流（60r/m + burst 容许突发）
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # FIXED-P4: 生产环境禁用API文档端点，防止攻击面信息泄露
    location /docs {
        return 404;
    }

    location /redoc {
        return 404;
    }

    location /openapi.json {
        return 404;
    }

    # --- WebSocket 代理 ---
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # FIXED-P4: WebSocket超时从24h降至1h
        proxy_send_timeout 3600s;
    }

    # --- 静态资源缓存 ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/edgelite;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
