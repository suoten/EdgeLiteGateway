# EdgeLiteGateway Nginx 反向代理配置
# 使用方法：
#   1. 修改 server_name 为你的实际域名
#   2. 修改 ssl_certificate 和 ssl_certificate_key 为你的证书路径
#   3. 修改 root 为前端构建产物路径
#   4. 将此文件复制到 /etc/nginx/conf.d/ 或 /etc/nginx/sites-enabled/
#   5. nginx -t && nginx -s reload

# ============================================
# HTTP -> HTTPS 重定向（可选）
# ============================================
server {
    listen 80;
    server_name edgelite.example.com;
    return 301 https://$server_name$request_uri;
}

# ============================================
# HTTPS 主配置
# ============================================
server {
    listen 443 ssl http2;
    server_name edgelite.example.com;

    # SSL 证书配置（请替换为实际路径）
    ssl_certificate /etc/ssl/certs/edgelite.example.com.pem;
    ssl_certificate_key /etc/ssl/private/edgelite.example.com.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 客户端上传文件大小限制
    client_max_body_size 50m;

    # --- 前端静态文件（SPA）---
    location / {
        root /var/www/edgelite;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- 后端 API 代理 ---
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- FastAPI 自动文档 ---
    location /docs {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # --- WebSocket 代理 ---
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- 静态资源缓存 ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/edgelite;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
