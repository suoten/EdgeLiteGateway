name: CI

# FIXED: 补充 DevOps 维度 — 商业就绪所需的持续集成流水线
# 覆盖：依赖缓存 → Lint(ruff) → 类型检查(pyright) → 测试+覆盖率 → 构建校验 → Docker 构建
# 设计原则：失败快速暴露、产物可追溯、不依赖外部硬件/协议设备（测试全 mock 化）

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  EDGELITE_SECURITY__SECRET_KEY: "ci-only-not-secret-key-do-not-use-in-prod-32bytes!"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.3.0"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check (report-only, non-blocking)
        run: ruff format --check . || true

  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install pyright
        run: pip install pyright
      - name: Pyright type check
        run: pyright

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        env:
          EDGELITE_SECURITY__SECRET_KEY: ${{ env.EDGELITE_SECURITY__SECRET_KEY }}
          EDGELITE_DB__PATH: ":memory:"
        run: |
          pytest --cov=edgelite --cov-report=xml:coverage.xml --cov-report=term-missing \
                 -p no:cacheprovider --timeout=60 -q
      - name: Enforce coverage floor (80%)
        run: pytest --cov=edgelite --cov-fail-under=80 --cov-report=term -q --no-header -p no:cacheprovider
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install build tooling
        run: pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build edgelite image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: edgelite:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security scan (trivy + pip-audit)
    runs-on: ubuntu-latest
    needs: [lint, docker]  # FIXED: 添加 docker 依赖，确保 Trivy 镜像扫描针对最新构建的镜像
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies
        run: pip-audit --strict --desc
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Run Trivy Docker image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          scan-ref: edgelite:ci
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
