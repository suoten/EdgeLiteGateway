name: CI

# FIXED: 补充 DevOps 维度 — 商业就绪所需的持续集成流水线
# 覆盖：依赖缓存 → Lint(ruff) → 类型检查(pyright) → 测试+覆盖率 → 构建校验 → Docker 构建 → 冒烟测试 → 安全扫描
# 设计原则：失败快速暴露、产物可追溯、不依赖外部硬件/协议设备（测试全 mock 化）

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  EDGELITE_SECURITY__SECRET_KEY: "ci-only-not-secret-key-do-not-use-in-prod-32bytes!"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.3.0"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Dependency consistency check
        run: python scripts/check_deps_consistency.py
      - name: Config drift check
        run: python scripts/compare_config.py
      - name: Architecture dependency check
        run: python scripts/check_architecture.py
      - name: API contract check (frontend/backend alignment)
        run: python scripts/check_api_contract.py
      - name: Docker Compose config validation
        run: docker compose -f docker/docker-compose.yml --profile monitoring config --quiet

  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install pyright
        run: pip install pyright
      - name: Pyright type check
        run: pyright

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage (enforce 80% floor)
        env:
          EDGELITE_SECURITY__SECRET_KEY: ${{ env.EDGELITE_SECURITY__SECRET_KEY }}
          EDGELITE_DB__PATH: ":memory:"
        run: |
          pytest --cov=edgelite \
                 --cov-report=xml:coverage.xml \
                 --cov-report=term-missing \
                 --cov-fail-under=80 \
                 --timeout=60 -q \
                 -p no:cacheprovider
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install build tooling
        run: pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build edgelite image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: edgelite:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke test (E2E)
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install httpx for smoke test
        run: pip install httpx
      - name: Start EdgeLite container
        run: |
          docker run -d --name edgelite-smoke \
            -p 8080:8080 \
            -e EDGELITE_SECURITY__SECRET_KEY="${{ env.EDGELITE_SECURITY__SECRET_KEY }}" \
            -e EDGELITE_ADMIN_PASSWORD="smoke-test-admin-pass" \
            -e DEV_MODE=true \
            edgelite:ci
      - name: Wait for health check
        run: |
          echo "⏳ Waiting for EdgeLite to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/live > /dev/null 2>&1; then
              echo "✅ EdgeLite is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ EdgeLite did not become healthy in 150s"
          docker logs edgelite-smoke --tail=50
          exit 1
      - name: Run smoke tests
        run: |
          python scripts/smoke_test.py \
            --base-url http://localhost:8080 \
            --user admin \
            --pass "smoke-test-admin-pass" \
            --retry 3
      - name: Cleanup
        if: always()
        run: docker rm -f edgelite-smoke || true

  acceptance:
    name: Acceptance gate (合并必过检查)
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install httpx for acceptance check
        run: pip install httpx
      # 启动 EdgeLite 容器（参考 smoke-test job 的启动方式）
      - name: Start EdgeLite container
        run: |
          docker run -d --name edgelite-acceptance \
            -p 8080:8080 \
            -e EDGELITE_SECURITY__SECRET_KEY="${{ env.EDGELITE_SECURITY__SECRET_KEY }}" \
            -e EDGELITE_ADMIN_PASSWORD="smoke-test-admin-pass" \
            -e DEV_MODE=true \
            edgelite:ci
      # 等待健康检查通过
      - name: Wait for health check
        run: |
          echo "⏳ Waiting for EdgeLite to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/live > /dev/null 2>&1; then
              echo "✅ EdgeLite is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ EdgeLite did not become healthy in 150s"
          docker logs edgelite-acceptance --tail=50
          exit 1
      # 运行验收门禁脚本（CI 环境无法启动前端 dev server，用 --skip-frontend 跳过前端检查）
      - name: Run acceptance gate
        run: |
          python scripts/acceptance_check.py \
            --base-url http://localhost:8080 \
            --skip-frontend \
            --user admin \
            --pass "smoke-test-admin-pass"
      # 清理容器
      - name: Cleanup
        if: always()
        run: docker rm -f edgelite-acceptance || true

  security:
    name: Security scan (trivy + pip-audit + SBOM)
    runs-on: ubuntu-latest
    needs: [lint, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package + security tools
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit cyclonedx-bom
      - name: Audit Python dependencies
        run: pip-audit --strict --desc
      - name: Generate SBOM (CycloneDX)
        run: |
          cyclonedx-py environment -o sbom.json --schema-version 1.5
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: warn
          retention-days: 30
      - name: Generate dependency lockfile
        run: |
          pip freeze --exclude-editable > requirements.lock
      - name: Upload lockfile artifact
        uses: actions/upload-artifact@v4
        with:
          name: requirements-lock
          path: requirements.lock
          if-no-files-found: warn
          retention-days: 30
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Run Trivy Docker image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          scan-ref: edgelite:ci
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
