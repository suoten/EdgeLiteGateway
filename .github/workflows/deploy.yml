name: Deploy

# CD (Continuous Deployment) pipeline for staging/production environments.
# Deploys EdgeLite Gateway to Kubernetes via Helm.
# Triggers: push to main (staging), release tag (production), or manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "web/src/**"
      - "docker/**"
      - "helm/**"
      - "k8s/**"
      - "pyproject.toml"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      image_tag:
        description: "Image tag to deploy (e.g. latest, v1.0.0)"
        required: false
        type: string

permissions:
  contents: read
  packages: read

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ── Job 1: Pre-deploy validation ──────────────────────────────────────
  validate:
    name: Pre-deploy validation
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve_tag.outputs.tag }}
      environment: ${{ steps.resolve_env.outputs.env }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve environment
        id: resolve_env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate Helm chart
        run: |
          if [ -d "helm/edgelite" ]; then
            echo "✅ Helm chart found"
          else
            echo "⚠️ No Helm chart found, skipping K8s deployment"
          fi
      - name: Check image exists
        run: |
          echo "Checking image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }}"
          # Image existence check happens at deploy time; this is a placeholder for registry API checks

  # ── Job 2: Deploy to Kubernetes (staging) ─────────────────────────────
  deploy-staging:
    name: Deploy to Staging (K8s)
    runs-on: ubuntu-latest
    needs: [validate]
    if: needs.validate.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging-edgelite.example.com
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          mkdir -p $HOME/.kube
          mv kubeconfig.yaml $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Deploy via Helm
        run: |
          if [ -d "helm/edgelite" ]; then
            helm upgrade --install edgelite ./helm/edgelite \
              --namespace edgelite-staging \
              --create-namespace \
              --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
              --set image.tag=${{ needs.validate.outputs.image_tag }} \
              --set environment=staging \
              --wait --timeout 300s \
              --atomic \
              --debug
            echo "✅ Staging deployment complete"
          else
            echo "⚠️ No Helm chart found, applying raw K8s manifests"
            kubectl apply -f k8s/ -n edgelite-staging || true
          fi
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/edgelite -n edgelite-staging --timeout=300s
          kubectl get pods -n edgelite-staging -l app=edgelite
      - name: Run smoke test
        run: |
          # Wait for service to be ready
          sleep 30
          # Get the staging service URL
          STAGING_URL=$(kubectl get svc edgelite -n edgelite-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "localhost")
          if [ "$STAGING_URL" = "localhost" ] || [ -z "$STAGING_URL" ]; then
            echo "⚠️ No external IP found, using port-forward for smoke test"
            kubectl port-forward svc/edgelite 8080:8080 -n edgelite-staging &
            PF_PID=$!
            sleep 10
            STAGING_URL="127.0.0.1"
          fi
          # Health check
          curl -f "http://$STAGING_URL:8080/health/live" || exit 1
          echo "✅ Smoke test passed"
          if [ -n "$PF_PID" ]; then kill $PF_PID; fi

  # ── Job 3: Deploy to Kubernetes (production) ──────────────────────────
  deploy-production:
    name: Deploy to Production (K8s)
    runs-on: ubuntu-latest
    needs: [validate]
    if: needs.validate.outputs.environment == 'production'
    environment:
      name: production
      url: https://edgelite.example.com
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          mkdir -p $HOME/.kube
          mv kubeconfig.yaml $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Deploy via Helm
        run: |
          if [ -d "helm/edgelite" ]; then
            helm upgrade --install edgelite ./helm/edgelite \
              --namespace edgelite-production \
              --create-namespace \
              --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
              --set image.tag=${{ needs.validate.outputs.image_tag }} \
              --set environment=production \
              --wait --timeout 600s \
              --atomic \
              --debug
            echo "✅ Production deployment complete"
          else
            echo "⚠️ No Helm chart found, applying raw K8s manifests"
            kubectl apply -f k8s/ -n edgelite-production || true
          fi
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/edgelite -n edgelite-production --timeout=600s
          kubectl get pods -n edgelite-production -l app=edgelite
      - name: Run production smoke test
        run: |
          sleep 30
          PROD_URL=$(kubectl get svc edgelite -n edgelite-production -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "localhost")
          if [ "$PROD_URL" = "localhost" ] || [ -z "$PROD_URL" ]; then
            kubectl port-forward svc/edgelite 8080:8080 -n edgelite-production &
            PF_PID=$!
            sleep 10
            PROD_URL="127.0.0.1"
          fi
          curl -f "http://$PROD_URL:8080/health/live" || exit 1
          curl -f "http://$PROD_URL:8080/health" || exit 1
          echo "✅ Production smoke test passed"
          if [ -n "$PF_PID" ]; then kill $PF_PID; fi
      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, rolling back..."
          helm rollback edgelite -n edgelite-production || kubectl rollout undo deployment/edgelite -n edgelite-production
          echo "⏪ Rollback complete"

  # ── Job 4: Post-deploy notification ───────────────────────────────────
  notify:
    name: Deployment notification
    runs-on: ubuntu-latest
    needs: [validate, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ needs.validate.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Staging Status**: ${{ needs.deploy-staging.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Production Status**: ${{ needs.deploy-production.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-staging.result }}" = "success" ] || [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
